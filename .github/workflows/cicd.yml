---
name: CICD
on:
  workflow_dispatch: 
   inputs:
    environment:
     description: This is the environment value where this workflow runs
     default: 'dev'
     required: true
     type: choice
     options:
       - prod
       - dev
       - staging
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code cloned from GitHub."
  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker Container build."
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container."
  deploy:
   needs: [code, build, test]
   runs-on: ubuntu-latest
   steps:
      - name: Deploying the app
        run: echo "Docker Compose Deployed the app."
